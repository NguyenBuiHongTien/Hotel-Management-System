services:
  # ---------- MongoDB (dùng chung cho dev/prod) ----------
  mongodb:
    image: mongo:7
    container_name: hotel_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init/rs-init.js:/docker-entrypoint-initdb.d/rs-init.js
    environment:
      MONGO_INITDB_DATABASE: hotel_management
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]

  # ---------- Production profile ----------
  backend:
    profiles: ["prod"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hotel_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      # Kết nối MongoDB qua tên service
      MONGODB_URL: mongodb://mongodb:27017/hotel_management
      # CORS: cho phép frontend (trình duyệt gọi API)
      FRONTEND_URL: http://localhost:3000
      JWT_SECRET: ${JWT_SECRET}
      # Gmail API (tùy chọn — thêm vào file .env ở root project)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GMAIL_REFRESH_TOKEN: ${GMAIL_REFRESH_TOKEN:-}
      GMAIL_SENDER_EMAIL: ${GMAIL_SENDER_EMAIL:-}
    depends_on:
      mongodb:
        condition: service_healthy

  # ---------- Frontend production (Vite build + Nginx) ----------
  frontend:
    profiles: ["prod"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # URL API khi user mở từ trình duyệt (localhost:5000)
        VITE_API_URL: http://localhost:5000/api
    container_name: hotel_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  # ---------- Development profile ----------
  backend-dev:
    profiles: ["dev"]
    image: node:20-alpine
    container_name: hotel_backend_dev
    working_dir: /app
    restart: unless-stopped
    command: sh -c "npm install && node --watch server.js"
    env_file:
      - ./backend/.env
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URL: mongodb://mongodb:27017/hotel_management
      FRONTEND_URL: http://localhost:5173
      JWT_SECRET: ${JWT_SECRET}
      TRUST_PROXY: "false"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      mongodb:
        condition: service_healthy

  frontend-dev:
    profiles: ["dev"]
    image: node:20-alpine
    container_name: hotel_frontend_dev
    working_dir: /app
    restart: unless-stopped
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000/api
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend-dev

volumes:
  mongodb_data:
  backend_node_modules:
  frontend_node_modules:
